<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

    <div class="container">

        <h1>Create Account</h1>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <br><br>

            <button type="submit">

                Signup

            </button>

        </form>

        <br>

        <a href="/login">

            Already have account? Login

        </a>

    </div>

</body>

</html>
